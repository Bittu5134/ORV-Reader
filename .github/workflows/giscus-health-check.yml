name: Giscus Health Check

on:
  schedule:
    - cron: '0 */3 * * *' # Runs every 3 hours
  workflow_dispatch:

jobs:
  check-giscus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npm install playwright

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Giscus Checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_NOTIFY }}
        run: node scripts/others/giscus_checker.js
